[build]
  command = "rm -rf .next/cache && npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Note: @netlify/plugin-nextjs handles _next/static mapping and cache headers automatically.

# Prevent Netlify edge from caching auth and demo pages.
# These depend on real-time auth state and must never be served stale.
[[headers]]
  for = "/auth"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/auth/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"

# Explicit no-cache for routes that were failing (signup, magic-link, mfa-verify)
[[headers]]
  for = "/auth/signup"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/auth/magic-link"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/auth/mfa-verify"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/demo"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/api/auth/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/api/demo/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"
